<!DOCTYPE html>
<html lang="zh-Hans" data-agent-theme-palette="default">
<head>
  <script>
    (function () {
      try {
        var path = location.pathname || "/";
        var basePath;
        if (/\.html$/i.test(path)) {
          basePath = path.replace(/[^/]+$/, "");
        } else if (path !== "/" && !path.endsWith("/")) {
          basePath = path + "/";
        } else {
          basePath = path;
        }
        if (!basePath || basePath === "/") {
          return;
        }
        var el = document.createElement("base");
        el.href = location.origin + basePath;
        var head = document.head || document.getElementsByTagName("head")[0];
        if (head) {
          head.insertBefore(el, head.firstChild);
        }
      } catch (eBase) {}
    })();
  </script>
  <script>
    try {
      var _tpL = localStorage.getItem("agent_theme_palette");
      document.documentElement.setAttribute(
        "data-agent-theme-palette",
        _tpL === "forest" ? "forest" : "default"
      );
    } catch (eTp) {}
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="一粟AI - 本机管理常用地址与能力。登录" />
  <link rel="icon" type="image/png" href="logo-yisuai.png" />
  <title>登录 - 一粟AI</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-page">
  <header class="auth-top" role="banner">
    <div class="auth-brand">
      <span class="auth-brand__mark" aria-hidden="true"
        ><img
          class="auth-brand__mark-img"
          src="logo-yisuai.png"
          alt=""
          width="32"
          height="32"
          loading="lazy"
          decoding="async"
      /></span>
      <span class="auth-brand__name">一粟AI</span>
    </div>
    <label for="auth-lang" class="sr-only">语言</label>
    <select id="auth-lang" class="auth-lang" aria-label="选择语言">
      <option value="zh-Hans" selected>简体中文</option>
      <option value="en">English</option>
    </select>
  </header>

  <div class="auth-wrap" id="auth-main">
    <div class="auth-hero">
      <h1 class="auth-hero__title">电商好技能，随时开用</h1>
      <p class="auth-hero__sub">把繁琐重复交给 AI，把时间留给重要决策</p>
      <div class="auth-hero__stage" aria-hidden="true">
        <div class="auth-hero__spin-layer auth-hero__spin-layer--orbit">
          <div class="auth-hero__orbit-layer">
            <svg
              class="auth-hero__orbit-svg"
              viewBox="0 0 400 400"
              width="100%"
              height="100%"
              preserveAspectRatio="xMidYMid meet"
              aria-hidden="true"
            >
              <g class="auth-hero__orbit-strokes" fill="none" stroke-width="1.05">
                <ellipse cx="200" cy="200" rx="190" ry="156" transform="rotate(-6 200 200)" />
                <ellipse cx="200" cy="200" rx="146" ry="118" transform="rotate(14 200 200)" />
                <ellipse cx="200" cy="200" rx="106" ry="86" transform="rotate(-18 200 200)" />
              </g>
            </svg>
          </div>
        </div>
        <div class="auth-hero__deco-stars" aria-hidden="true">
          <span class="auth-hero__star auth-hero__star--tl">✦</span>
          <span class="auth-hero__star auth-hero__star--tr">✦</span>
          <span class="auth-hero__star auth-hero__star--bl">✦</span>
          <span class="auth-hero__star auth-hero__star--br">✦</span>
          <span class="auth-hero__star auth-hero__star--c1">✦</span>
          <span class="auth-hero__star auth-hero__star--c2">✦</span>
        </div>
        <div class="auth-hero__logo-bg">
          <div class="auth-hero__logo-stack">
            <img
              class="auth-hero__logo-img"
              src="logo-yisuai-hero.svg"
              alt=""
              width="256"
              height="256"
              loading="lazy"
              decoding="async"
            />
          </div>
        </div>
        <div class="auth-hero__spin-layer auth-hero__spin-layer--skills">
          <div class="auth-hero__cloud" id="auth-hero-cloud"></div>
        </div>
      </div>
    </div>

    <div class="auth-panel">
      <div class="auth-card">
        <h2 class="auth-card__title">欢迎使用</h2>
        <div class="auth-tabs" role="tablist" aria-label="登录方式">
          <button
            type="button"
            class="auth-tabs__tab"
            role="tab"
            id="tab-phone"
            aria-selected="false"
            aria-controls="panel-phone"
            tabindex="-1"
          >手机号（演示）</button>
          <button
            type="button"
            class="auth-tabs__tab"
            role="tab"
            id="tab-account"
            aria-selected="true"
            aria-controls="panel-account"
            tabindex="0"
          >邮箱登录</button>
        </div>

        <form
          class="auth-form auth-phone"
          id="panel-phone"
          role="tabpanel"
          hidden
          aria-hidden="true"
          aria-labelledby="tab-phone"
        >
          <div class="auth-field auth-field--row">
            <label for="cc" class="sr-only">区号</label>
            <select class="auth-code" id="cc" name="cc" aria-label="区号">
              <option value="+86" selected>+86</option>
            </select>
            <input
              class="auth-input"
              type="tel"
              name="phone"
              id="phone"
              inputmode="numeric"
              autocomplete="tel"
              placeholder="请输入手机号"
            />
          </div>
          <div class="auth-field">
            <label for="code" class="sr-only">验证码</label>
            <div class="auth-otp-line">
              <input
                class="auth-input"
                type="text"
                name="code"
                id="code"
                inputmode="numeric"
                autocomplete="one-time-code"
                placeholder="请输入验证码"
                maxlength="8"
              />
              <button type="button" class="auth-send" id="auth-send" disabled>获取验证码</button>
            </div>
          </div>
          <p class="auth-terms">
            已阅读并同意
            <a href="#" tabindex="-1" onclick="return false">服务条款</a>、
            <a href="#" tabindex="-1" onclick="return false">隐私说明</a>
            与
            <a href="#" tabindex="-1" onclick="return false">使用须知</a>
            （本页为演示，不连接短信服务。）
          </p>
          <button type="submit" class="auth-submit">登录 / 注册</button>
        </form>

        <form
          class="auth-form auth-account"
          id="panel-account"
          role="tabpanel"
          aria-hidden="false"
          aria-labelledby="tab-account"
          novalidate
        >
          <p class="auth-error" id="auth-account-error" role="alert" hidden></p>
          <div class="auth-field">
            <label for="auth-email" class="sr-only">邮箱</label>
            <div class="auth-field--plain">
              <input
                class="auth-input"
                type="email"
                name="email"
                id="auth-email"
                autocomplete="email"
                required
                placeholder="邮箱"
              />
            </div>
          </div>
          <div class="auth-field">
            <label for="auth-password" class="sr-only">密码</label>
            <div class="auth-field--plain">
              <input
                class="auth-input"
                type="password"
                name="password"
                id="auth-password"
                autocomplete="current-password"
                required
                placeholder="密码"
              />
            </div>
          </div>
          <div class="auth-actions">
            <button type="submit" class="auth-submit" id="auth-signin">登录</button>
            <button type="button" class="auth-submit auth-submit--secondary" id="auth-signup">注册</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="auth-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script src="auth-client.js"></script>
  <script src="skills-cloud.js"></script>
  <script src="auth-hero-skills.js" defer></script>
  <script src="auth-login.js"></script>
  <script>
    (function () {
      var tabPhone = document.getElementById("tab-phone");
      var tabAccount = document.getElementById("tab-account");
      var panelPhone = document.getElementById("panel-phone");
      var panelAccount = document.getElementById("panel-account");
      var phone = document.getElementById("phone");
      var send = document.getElementById("auth-send");

      function setTab(phoneOn) {
        tabPhone.setAttribute("aria-selected", String(phoneOn));
        tabAccount.setAttribute("aria-selected", String(!phoneOn));
        tabPhone.tabIndex = phoneOn ? 0 : -1;
        tabAccount.tabIndex = phoneOn ? -1 : 0;
        panelPhone.hidden = !phoneOn;
        panelAccount.hidden = phoneOn;
        panelPhone.setAttribute("aria-hidden", String(!phoneOn));
        panelAccount.setAttribute("aria-hidden", String(phoneOn));
      }

      tabPhone.addEventListener("click", function () {
        setTab(true);
      });
      tabAccount.addEventListener("click", function () {
        setTab(false);
      });
      tabPhone.addEventListener("keydown", function (e) {
        if (e.key === "ArrowRight" || e.key === "End") {
          e.preventDefault();
          tabAccount.click();
          tabAccount.focus();
        }
      });
      tabAccount.addEventListener("keydown", function (e) {
        if (e.key === "ArrowLeft" || e.key === "Home") {
          e.preventDefault();
          tabPhone.click();
          tabPhone.focus();
        }
      });

      function sendEnabled() {
        var v = (phone.value || "").replace(/\D/g, "");
        return v.length >= 11;
      }
      function updateSend() {
        if (send.getAttribute("data-locked") === "1") {
          return;
        }
        send.disabled = !sendEnabled();
      }
      send.addEventListener("click", function (e) {
        e.preventDefault();
        if (!sendEnabled() || send.getAttribute("data-locked") === "1") {
          return;
        }
        send.setAttribute("data-locked", "1");
        var prev = send.textContent;
        send.textContent = "已发送(演示)";
        setTimeout(function () {
          send.textContent = prev;
          send.removeAttribute("data-locked");
          updateSend();
        }, 2000);
      });
      phone.addEventListener("input", function () {
        if (send.getAttribute("data-locked") !== "1") {
          updateSend();
        }
      });
      updateSend();

      function fakeSubmit(msg) {
        if (msg && window.alert) {
          window.alert(msg);
        }
      }

      document.querySelector(".auth-phone").addEventListener("submit", function (e) {
        e.preventDefault();
        fakeSubmit("当前为纯前端页，不收集手机号，也不连接短信服务。关闭即可回到主站。");
      });
    })();
  </script>
</body>
</html>
